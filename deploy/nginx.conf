# Nginx — reverse proxy pour Saytu Yëf
# À copier dans : /etc/nginx/sites-available/saytu-yef
# Puis : ln -s /etc/nginx/sites-available/saytu-yef /etc/nginx/sites-enabled/
#
# NB : le bloc HTTPS (443) sera ajouté automatiquement par Certbot.
#      On démarre avec le bloc HTTP (80) ci-dessous.

server {
    listen 80;
    listen [::]:80;
    server_name saytu-yef.xelltekk.com;

    # Taille max des uploads (photos produits encodées)
    client_max_body_size 10M;

    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache long pour les assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA : le service worker doit pouvoir se mettre à jour rapidement
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=3600";
    }

    location /icons/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=604800";
    }
}
